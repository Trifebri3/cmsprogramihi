<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portal Artikel</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f4f7fb;
}

header{

background:linear-gradient(135deg,#2563eb,#0ea5e9);

padding:60px 20px;
color:white;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.1);

}

header h1{

font-size:42px;
font-weight:700;

}

header p{

opacity:.9;
margin-top:10px;

}

.container{

max-width:1400px;
margin:auto;
padding:40px 20px;

}

.grid{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(340px,1fr));
gap:25px;

}

.card{

background:white;
border-radius:20px;
overflow:hidden;
box-shadow:0 15px 35px rgba(0,0,0,.08);
transition:.35s;
display:flex;
flex-direction:column;

}

.card:hover{

transform:translateY(-8px);
box-shadow:0 25px 40px rgba(0,0,0,.15);

}

.cover{

height:220px;
background:#ddd;
position:relative;
overflow:hidden;

}

.cover img{

width:100%;
height:100%;
object-fit:cover;

}

.badge{

position:absolute;
top:15px;
left:15px;
background:#2563eb;
color:white;
padding:6px 14px;
border-radius:40px;
font-size:12px;
font-weight:600;

}

.logo{

position:absolute;
right:15px;
bottom:15px;
width:50px;
height:50px;
background:white;
border-radius:50%;
padding:5px;
box-shadow:0 5px 15px rgba(0,0,0,.2);

}

.logo img{

width:100%;
height:100%;
object-fit:contain;

}

.content{

padding:25px;

}

.program{

display:inline-block;
padding:6px 14px;
background:#eef6ff;
color:#2563eb;
border-radius:30px;
font-size:13px;
margin-bottom:15px;
font-weight:600;

}

.title{

font-size:22px;
font-weight:700;
margin-bottom:10px;
color:#222;

}

.preview{

color:#666;
line-height:1.7;
margin-bottom:20px;
height:80px;
overflow:hidden;

}

.meta{

display:flex;
justify-content:space-between;
font-size:13px;
color:#888;
margin-bottom:18px;

}

button{

border:none;
background:linear-gradient(135deg,#2563eb,#0ea5e9);
color:white;
padding:12px 20px;
border-radius:10px;
cursor:pointer;
font-size:14px;
font-weight:600;
transition:.3s;

}

button:hover{

transform:scale(1.05);

}

.loading{

display:flex;
justify-content:center;
align-items:center;
height:250px;
font-size:22px;
font-weight:600;
color:#2563eb;

}

.empty{

text-align:center;
padding:80px;
color:#999;

}

.modal{

position:fixed;
inset:0;
background:rgba(0,0,0,.6);
display:none;
justify-content:center;
align-items:center;
padding:30px;
z-index:999;

}

.modal-content{

background:white;
width:900px;
max-width:100%;
max-height:90vh;
overflow:auto;
border-radius:20px;

}

.modal-cover{

width:100%;
height:350px;
object-fit:cover;

}

.modal-body{

padding:30px;

}

.close{

float:right;
cursor:pointer;
font-size:30px;
font-weight:bold;

}

.gallery{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
margin-top:20px;

}

.gallery img{

width:100%;
height:160px;
object-fit:cover;
border-radius:12px;

}

</style>

</head>

<body>

<header>

<h1>Portal Artikel</h1>

<p>Konten otomatis dari Laravel API</p>

</header>

<div class="container">

<div id="loading" class="loading">
Memuat Artikel...
</div>

<div id="articles" class="grid"></div>

</div>

<div class="modal" id="modal">

<div class="modal-content">

<div id="modalData"></div>

</div>

</div>

<script>

const API="http://127.0.0.1:8000/api/articles";

const placeholder="https://via.placeholder.com/800x500?text=No+Image";

let articlesData = [];

fetch(API)

.then(res=>res.json())

.then(res=>{

loading.remove();

if(!res.data.length){

articles.innerHTML="<div class='empty'>Tidak ada artikel.</div>";
return;

}

articlesData = res.data;

res.data.forEach((article, index)=>{

const cover=article.cover_url || placeholder;

const logo=(article.program && article.program.logo_url) || "";

const programName = article.program ? article.program.name : "Umum";

const authorName = article.author ? article.author.name : "Sistem";

const html=`

<div class="card">

<div class="cover">

<img src="${cover}">

<div class="badge">${article.type.toUpperCase()}</div>

${logo ? `<div class="logo"><img src="${logo}"></div>`:""}

</div>

<div class="content">

<div class="program">${programName}</div>

<div class="title">${article.title}</div>

<div class="preview">${article.preview_text || '-'}</div>

<div class="meta">

<span>${authorName}</span>

<span>${new Date(article.published_at || article.created_at).toLocaleDateString()}</span>

</div>

<button onclick='showDetail(${index})'>
Lihat Detail
</button>

</div>

</div>

`;

articles.innerHTML+=html;

});

})

.catch(()=>{

loading.innerHTML="❌ Gagal mengambil data API.";

});

function showDetail(index){

const article = articlesData[index];

if(!article) return;

let body="";

if(article.content_blocks && Array.isArray(article.content_blocks)) {
    article.content_blocks.forEach(block=>{

        if(block.heading){
            body+=`<h2>${block.heading}</h2>`;
        }

        if(block.title){
            body+=`<h2>${block.title}</h2>`;
        }

        if(block.subtitle){
            body+=`<p>${block.subtitle}</p>`;
        }

        if(block.body){
            body+=`<div>${block.body}</div>`;
        }

        if(block.button_text){
            body+=`
            <br>
            <a href="${block.button_url}" target="_blank">
                <button>${block.button_text}</button>
            </a>
            `;
        }

    });
}

let gallery="";

if(article.gallery_images && Array.isArray(article.gallery_images) && article.gallery_images.length){

gallery="<h3>Galeri</h3><div class='gallery'>";

article.gallery_images.forEach(img=>{

gallery+=`<img src="${img}">`;

});

gallery+="</div>";

}

modalData.innerHTML=`

<span class="close" onclick="modal.style.display='none'">&times;</span>

<img class="modal-cover" src="${article.cover_url || placeholder}">

<div class="modal-body">

<h1>${article.title}</h1>

<br>

${body}

${gallery}

</div>

`;

modal.style.display="flex";

}

window.onclick=function(e){

if(e.target==modal){

modal.style.display="none";

}

}

</script>

</body>
</html>
